<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundamentos - Flex-shrink</title>
    <style>
        .flex-container{
            display: flex;
            border: 1px solid black;
            max-width: 350px;
            margin-bottom: 10px;
        }

        .item{
            background-color: orangered;
            font-size: 24px;
            text-align: center;
            margin: 5px;
        }

        .s-1{
            flex-shrink: 1;
        }

        .fg-1{
            flex-grow: 1;
        }

        .s-0{
            flex-shrink: 0;
            flex-basis: 200px;
        }

        .s-2{
            flex-shrink: 2;
            flex-basis: 100px;
        }

        .s-3{
            flex-shrink: 3;
            flex-basis: 100px;
        }
    </style>
</head>
<body>
    <!-- flex shrink é a propriedade que estabelece a capacidade de reduçõO ou compressão do taamnaho de um item-->
        <p>flex-shrink: 1</p>
        <div class="flex-container">
            <div class="item s-1 fg-1">A</div>
            <div class="item s-1 fg-1">B</div>
            <div class="item s-1 fg-1">C</div>
            <div class="item s-1 fg-1">D</div>
            <div class="item s-1 fg-1">E</div>
        </div>

        <!-- shrink e grow comprime todos elementos, respeitando tamanho minimo dos elementos. -->

        <div class="flex-container">
            <div class="item s-1 fg-1">A</div>
            <div class="item s-1 fg-1">The generated</div>
            <div class="item s-1 fg-1">C</div>
            <div class="item s-1 fg-1">D</div>
        </div>
        
        
        <p> flex-shrink: 0 / basis: 100px</p>
        <!-- shrink em zero não permite diminuição.--> 
        <div class="flex-container">    
            <div class="item s-0 fg-1">A</div>
            <div class="item s-0 fg-1">The generated</div>
            <div class="item s-0 fg-1">C generated</div>
            <div class="item s-0 fg-1">C generated</div>
            <div class="item s-0 fg-1">D</div>
        </div>

        <p> flex-shrink: mix / basis: 100px</p>
        <!-- nesse caso, tenta fazer com que os itens se comprimam e não vazem,respeitando o shrink e o basis pré-definido, e agrupando os itens.-->
        <div class="flex-container">
            <div class="item s-1 fg-1">A</div>
            <div class="item s-2 fg-1">The generated</div>
            <div class="item s-2 fg-1">C</div>
            <div class="item s-3 fg-1">D</div>
        </div>
</body>
</html>
